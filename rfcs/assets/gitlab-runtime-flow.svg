<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="780" viewBox="0 0 1120 780" role="img" aria-labelledby="title desc">
  <title id="title">setup-vp GitLab integration overview</title>
  <desc id="desc">Repository files and GitLab job runtime flow for setup-vp. The remote YAML template starts the job, bootstrap.sh installs Vite+ and runs the compiled GitLab runtime, and src/gitlab modules provide the runtime behavior.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path class="arrow-fill" d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
    <marker id="soft-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path class="soft-arrow-fill" d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
    <style>
      .bg { fill: none; }
      .frame { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
      .flow { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; }
      .files { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; }
      .modules { fill: #ecfdf5; stroke: #0f766e; stroke-width: 1.5; }
      .contrast { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
      .node { fill: #ffffff; stroke: #6366f1; stroke-width: 1.2; }
      .shell-node { fill: #ffffff; stroke: #0891b2; stroke-width: 1.2; }
      .runtime-node { fill: #ffffff; stroke: #16a34a; stroke-width: 1.2; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .row-alt { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .module-item { fill: #ffffff; stroke: #14b8a6; stroke-width: 1.2; }
      .label { fill: #111827; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0; }
      .small { fill: #374151; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0; }
      .tiny { fill: #4b5563; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 550; letter-spacing: 0; }
      .caption { fill: #4b5563; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0; }
      .group-label { fill: #6b7280; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 650; letter-spacing: 0; text-transform: uppercase; }
      .arrow { fill: none; stroke: #374151; stroke-width: 1.8; marker-end: url(#arrow); }
      .arrow-fill { fill: #374151; }
      .soft-arrow { fill: none; stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 7 6; marker-end: url(#soft-arrow); }
      .soft-arrow-fill { fill: #64748b; }
      .line { fill: none; stroke: #64748b; stroke-width: 1.3; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="780" />
  <rect class="frame" x="24" y="24" width="1072" height="732" rx="8" />

  <text class="group-label" x="68" y="62">gitlab job runtime</text>
  <text class="group-label" x="68" y="386">repository files</text>
  <text class="group-label" x="782" y="386">typescript runtime responsibilities</text>

  <rect class="flow" x="56" y="82" width="1008" height="260" rx="8" />
  <text class="label" x="560" y="116" text-anchor="middle">GitLab Job Runtime Flow</text>
  <text class="caption" x="560" y="138" text-anchor="middle">The remote template starts in YAML, then hands off to shell, then to the compiled Node.js runtime.</text>

  <rect class="node" x="116" y="174" width="172" height="64" rx="8" />
  <text class="small" x="202" y="199" text-anchor="middle">Remote template</text>
  <text class="tiny" x="202" y="219" text-anchor="middle">GitLab include:remote</text>

  <rect class="shell-node" x="364" y="174" width="172" height="64" rx="8" />
  <text class="small" x="450" y="199" text-anchor="middle">bootstrap.sh</text>
  <text class="tiny" x="450" y="219" text-anchor="middle">install vp, check node</text>

  <rect class="runtime-node" x="612" y="174" width="172" height="64" rx="8" />
  <text class="small" x="698" y="199" text-anchor="middle">GitLab runtime</text>
  <text class="tiny" x="698" y="219" text-anchor="middle">node dist/gitlab/index.mjs</text>

  <rect class="runtime-node" x="860" y="174" width="132" height="64" rx="8" />
  <text class="small" x="926" y="199" text-anchor="middle">vp commands</text>
  <text class="tiny" x="926" y="219" text-anchor="middle">install, version</text>

  <path class="arrow" d="M 288 206 H 364" />
  <path class="arrow" d="M 536 206 H 612" />
  <path class="arrow" d="M 784 206 H 860" />

  <text class="caption" x="450" y="278" text-anchor="middle">Shell stays small: download, install, PATH export, runtime handoff.</text>
  <text class="caption" x="698" y="302" text-anchor="middle">TypeScript handles the behavior that would be hard to maintain in shell.</text>

  <rect class="files" x="56" y="406" width="660" height="302" rx="8" />
  <text class="label" x="386" y="440" text-anchor="middle">Repository files that make the template work</text>
  <text class="caption" x="386" y="462" text-anchor="middle">GitLab downloads generated/runtime files from the same setup-ref as the remote template.</text>

  <rect class="row-alt" x="86" y="490" width="600" height="34" rx="6" />
  <text class="small" x="104" y="511">gitlab/setup-vp.yml</text>
  <text class="tiny" x="318" y="511">remote include entry, inputs, before_script</text>

  <rect class="row" x="86" y="532" width="600" height="34" rx="6" />
  <text class="small" x="104" y="553">gitlab/bootstrap.sh</text>
  <text class="tiny" x="318" y="553">installs Vite+, exports PATH, downloads runtime</text>

  <rect class="row-alt" x="86" y="574" width="600" height="34" rx="6" />
  <text class="small" x="104" y="595">src/gitlab/*.ts</text>
  <text class="tiny" x="318" y="595">maintainable TypeScript source for GitLab behavior</text>

  <rect class="row" x="86" y="616" width="600" height="34" rx="6" />
  <text class="small" x="104" y="637">dist/gitlab/index.mjs</text>
  <text class="tiny" x="318" y="637">compiled bundle executed by Node.js in GitLab</text>

  <rect class="row-alt" x="86" y="658" width="600" height="34" rx="6" />
  <text class="small" x="104" y="679">dist/index.mjs</text>
  <text class="tiny" x="318" y="679">separate GitHub Actions bundle</text>

  <rect class="modules" x="756" y="406" width="308" height="188" rx="8" />
  <text class="label" x="910" y="438" text-anchor="middle">src/gitlab modules</text>
  <text class="caption" x="910" y="460" text-anchor="middle">split by runtime responsibility</text>

  <rect class="module-item" x="784" y="482" width="120" height="30" rx="6" />
  <text class="tiny" x="844" y="502" text-anchor="middle">auth</text>
  <rect class="module-item" x="916" y="482" width="120" height="30" rx="6" />
  <text class="tiny" x="976" y="502" text-anchor="middle">run-install</text>
  <rect class="module-item" x="784" y="526" width="120" height="30" rx="6" />
  <text class="tiny" x="844" y="546" text-anchor="middle">install-sfw</text>
  <rect class="module-item" x="916" y="526" width="120" height="30" rx="6" />
  <text class="tiny" x="976" y="546" text-anchor="middle">shell / utils</text>

  <rect class="contrast" x="756" y="626" width="308" height="82" rx="8" />
  <text class="label" x="910" y="658" text-anchor="middle">GitHub Actions path</text>
  <text class="caption" x="910" y="680" text-anchor="middle">GitHub reads action.yml and runs</text>
  <text class="caption" x="910" y="698" text-anchor="middle">dist/index.mjs with using: node24.</text>

  <path class="soft-arrow" d="M 686 506 C 744 484 736 430 612 228" />
  <path class="soft-arrow" d="M 686 552 C 742 526 760 492 784 492" />
  <path class="soft-arrow" d="M 686 632 C 756 606 794 562 698 238" />
  <path class="soft-arrow" d="M 756 668 C 716 686 694 680 686 676" />

  <text class="caption" x="560" y="742" text-anchor="middle">GitLab support is a GitLab-native entrypoint, not the GitHub Action bundle running inside GitLab.</text>
</svg>
